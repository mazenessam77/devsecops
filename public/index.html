<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern CRUD application for managing items with Node.js, Express, and MySQL">
    <title>CRUD Manager — Items</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background animated gradient -->
    <div class="bg-gradient"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
            </div>
            <div>
                <h1>Item Manager <span style="font-size: 0.5em; background: #3b82f6; padding: 4px 8px; border-radius: 12px; vertical-align: middle; color: white;">Beta</span></h1>
                <p class="subtitle">Manage your entire inventory seamlessly in real-time</p>
            </div>
        </header>

        <!-- Main Content Grid -->
        <div class="main-grid">
            <!-- Form Card -->
            <section class="card form-card" id="form-section">
                <div class="card-header">
                    <h2 id="form-title">
                        <span class="dot dot-green"></span>
                        Add New Item
                    </h2>
                </div>
                <form id="item-form" autocomplete="off">
                    <input type="hidden" id="item-id">
                    
                    <div class="form-group">
                        <label for="item-name">Name</label>
                        <input type="text" id="item-name" placeholder="e.g. Wireless Headphones" required>
                    </div>

                    <div class="form-group">
                        <label for="item-description">Description</label>
                        <textarea id="item-description" rows="3" placeholder="Brief description of the item..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="item-price">Price ($)</label>
                        <input type="number" id="item-price" step="0.01" min="0" placeholder="0.00" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submit-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Item
                        </button>
                        <button type="button" class="btn btn-ghost" id="cancel-btn" style="display:none;" onclick="cancelEdit()">
                            Cancel
                        </button>
                    </div>
                </form>
            </section>

            <!-- Table Card -->
            <section class="card table-card" id="table-section">
                <div class="card-header">
                    <h2>
                        <span class="dot dot-blue"></span>
                        All Items
                    </h2>
                    <span class="badge" id="item-count">0</span>
                </div>

                <!-- Loading Skeleton -->
                <div id="loading" class="loading-container">
                    <div class="spinner"></div>
                    <p>Loading items...</p>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state" style="display:none;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                    </svg>
                    <p>No items yet. Add your first item!</p>
                </div>

                <!-- Items Table -->
                <div class="table-wrapper" id="table-wrapper" style="display:none;">
                    <table id="items-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Price</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="items-tbody">
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
<!-- Beta test -->
